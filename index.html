function buildCards() {
  const grid = document.getElementById('cardsGrid');
  RESTAURANTS.forEach((r, i) => {
    const cats  = r.restaurant_menu.filter(m => m.type === 'cat');
    const items = r.restaurant_menu.filter(m => m.type === 'item');
    const div = document.createElement('div');
    div.className = 'card';
    div.id = 'card_' + i;
    div.innerHTML = `
      <div class="card-checkbox" id="chk_${i}"></div>
      <div class="card-import-checkbox" id="ichk_${i}"></div>
      <div class="card-header">
        <div class="card-icon">${r.icon}</div>
        <div>
          <div class="card-name">${r.name}</div>
          <div class="card-count">${cats.length} أقسام · ${items.length} منتج</div>
        </div>
      </div>
      <div class="sections">
        ${cats.map(c => `<span class="sec-tag">${c.icon} ${c.name}</span>`).join('')}
      </div>
      <div class="status" id="status_${i}">—</div>
      <div class="logo-section">
        <span class="logo-label">🖼️ لوغو المطعم (اختياري — يُستخدم لجميع المنتجات بدون صورة)</span>
        <img class="logo-preview" id="logo_preview_${i}" src="" alt="logo" />
        <input type="file" accept="image/*" class="logo-input" onchange="handleLogoFile(event, ${i})" />
        <input type="text" class="logo-url-input" id="logo_url_${i}" placeholder="أو أدخل رابط اللوغو مباشرة..." oninput="handleLogoUrl(event, ${i})" value="${r.logo || ''}" />
        <button class="btn-gen-logo" onclick="generateLogoLocal(${i})" id="gen_btn_${i}">🎨 إنشاء لوغو تلقائي</button>
        <div class="gen-logo-status" id="gen_status_${i}"></div>
      </div>
    `;
    grid.appendChild(div);
  });
}

function setStatus(i, type, msg) {
  const el = document.getElementById('status_' + i);
  el.className = 'status ' + type;
  el.innerText = msg;
}

async function importAll() {
  const btn = document.getElementById('mainBtn');
  btn.disabled = true;
  btn.innerText = '⏳ جاري الاستيراد...';

  // جلب الأسماء الموجودة
  const { data: existing } = await _client.from('restaurants').select('name');
  const existingNames = (existing || []).map(r => r.name);

  let added = 0, skipped = 0, failed = 0;

  for (let i = 0; i < RESTAURANTS.length; i++) {
    const r = RESTAURANTS[i];
    setStatus(i, 'pending', '⏳ جاري الإضافة...');

    if (existingNames.includes(r.name)) {
      setStatus(i, 'exists', '✅ موجود مسبقاً — تم التخطي');
      skipped++;
      continue;
    }

    const restaurantLogo = _logoData[i] || r.logo || '';
    const menuWithLogo = r.restaurant_menu.map(m => {
      if (m.type === 'item' && !m.img && restaurantLogo) {
        return Object.assign({}, m, { img: restaurantLogo });
      }
      return m;
    });

    const payload = {
      name:            r.name,
      branch:          r.branch,
      logo:            restaurantLogo,
      delivery_fee:    r.delivery_fee,
      open_time:       r.open_time,
      close_time:      r.close_time,
      contract:        r.contract,
      restaurant_menu: menuWithLogo,
      profit_percent:  r.profit_percent,
      maps_url:        r.maps_url,
      specialty_type:  r.specialty_type,
      profit_history:  r.profit_history,
    };

    const { error } = await _client.from('restaurants').insert([payload]);

    if (error) {
      setStatus(i, 'error', '❌ فشل: ' + error.message);
      failed++;
    } else {
      const items = r.restaurant_menu.filter(m => m.type === 'item').length;
      setStatus(i, 'success', `✅ تمت الإضافة — ${items} منتج`);
      added++;
    }
  }

  // ملخص
  const sumDiv = document.getElementById('summary');
  sumDiv.style.display = 'block';
  document.getElementById('sumContent').innerHTML = `
    <div class="sum-row"><span>تمت إضافتهم</span><span class="ok">${added} مطعم ✅</span></div>
    <div class="sum-row"><span>موجودون مسبقاً</span><span class="skip">${skipped} مطعم</span></div>
    <div class="sum-row"><span>فشل الإضافة</span><span class="err">${failed} مطعم</span></div>
    <div class="sum-row" style="margin-top:8px; font-weight:bold;"><span>المجموع</span><span>${RESTAURANTS.length} مطعم</span></div>
  `;

  btn.innerText = added > 0 ? `✅ تمت إضافة ${added} مطعم — افتح لوحة الإدارة!` : '⚠️ لم يُضف أي مطعم جديد';
  btn.style.background = added > 0 ? '#2ecc71' : '#e74c3c';
  btn.style.color = '#000';

  sumDiv.scrollIntoView({ behavior: 'smooth' });
}

let _deleteMode = 'all'; // 'all' or 'selected'
let _selectModeActive = false;
let _selectedIndexes = new Set();

function toggleSelectMode() {
  _selectModeActive = !_selectModeActive;
  const toolbar = document.getElementById('selectToolbar');
  const grid = document.getElementById('cardsGrid');
  const btn = document.getElementById('selectModeBtn');
  if (_selectModeActive) {
    toolbar.classList.add('active');
    btn.innerText = '✖️ إلغاء وضع الاختيار';
    Array.from(grid.children).forEach((card, i) => {
      card.classList.add('selectable');
      card.onclick = () => toggleCardSelection(card, i);
    });
  } else {
    toolbar.classList.remove('active');
    btn.innerText = '☑️ الحذف الاختياري — اختر المطاعم';
    _selectedIndexes.clear();
    Array.from(grid.children).forEach((card) => {
      card.classList.remove('selectable', 'selected');
      card.onclick = null;
    });
    document.getElementById('selectedCount').innerText = '0 مطعم محدد';
  }
}

function toggleCardSelection(card, i) {
  if (_selectedIndexes.has(i)) {
    _selectedIndexes.delete(i);
    card.classList.remove('selected');
  } else {
    _selectedIndexes.add(i);
    card.classList.add('selected');
  }
  document.getElementById('selectedCount').innerText = _selectedIndexes.size + ' مطعم محدد';
}

function selectAllCards() {
  const grid = document.getElementById('cardsGrid');
  Array.from(grid.children).forEach((card, i) => {
    _selectedIndexes.add(i);
    card.classList.add('selected');
  });
  document.getElementById('selectedCount').innerText = _selectedIndexes.size + ' مطعم محدد';
}

function deselectAllCards() {
  const grid = document.getElementById('cardsGrid');
  _selectedIndexes.clear();
  Array.from(grid.children).forEach((card) => {
    card.classList.remove('selected');
  });
  document.getElementById('selectedCount').innerText = '0 مطعم محدد';
}

function confirmDeleteAll() {
  _deleteMode = 'all';
  document.getElementById('modalTitle').innerText = '⚠️ تأكيد حذف الكل';
  document.getElementById('modalMsg').innerText = 'هل أنت متأكد؟ سيتم حذف جميع المطاعم الـ ' + RESTAURANTS.length + ' من قاعدة البيانات بشكل نهائي ولا يمكن التراجع!';
  document.getElementById('deleteModal').classList.add('open');
}

function confirmDeleteSelected() {
  if (_selectedIndexes.size === 0) {
    alert('لم تحدد أي مطعم للحذف!');
    return;
  }
  _deleteMode = 'selected';
  document.getElementById('modalTitle').innerText = '⚠️ تأكيد حذف المحددين';
  document.getElementById('modalMsg').innerText = 'سيتم حذف ' + _selectedIndexes.size + ' مطعم محدد من قاعدة البيانات بشكل نهائي. هل أنت متأكد؟';
  document.getElementById('deleteModal').classList.add('open');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('open');
}

async function executeDelete() {
  closeDeleteModal();
  const confirmBtn = document.getElementById('modalConfirmBtn');
  confirmBtn.disabled = true;

  if (_deleteMode === 'all') {
    document.getElementById('deleteAllBtn').disabled = true;
    document.getElementById('deleteAllBtn').innerText = '⏳ جاري الحذف...';
    let deletedCount = 0, failedCount = 0;
    for (let i = 0; i < RESTAURANTS.length; i++) {
      const { error } = await _client.from('restaurants').delete().eq('name', RESTAURANTS[i].name);
      if (error) {
        failedCount++;
        setStatus(i, 'error', '❌ فشل الحذف: ' + error.message);
      } else {
        deletedCount++;
        setStatus(i, 'error', '🗑️ تم الحذف');
        const card = document.getElementById('card_' + i);
        if (card) card.style.opacity = '0.4';
      }
      document.getElementById('deleteAllBtn').innerText = '⏳ جاري الحذف... ' + (i+1) + '/' + RESTAURANTS.length;
    }
    if (failedCount === 0) {
      document.getElementById('deleteAllBtn').innerText = '✅ تم حذف ' + deletedCount + ' مطعم';
      document.getElementById('deleteAllBtn').style.background = '#2ecc71';
    } else {
      document.getElementById('deleteAllBtn').innerText = '⚠️ تم حذف ' + deletedCount + ' — فشل ' + failedCount;
    }
    document.getElementById('deleteAllBtn').disabled = false;
  } else {
    document.getElementById('selectModeBtn').disabled = true;
    const selectedArr = Array.from(_selectedIndexes);
    let deletedCount = 0, failedCount = 0;
    for (let idx = 0; idx < selectedArr.length; idx++) {
      const i = selectedArr[idx];
      const { error } = await _client.from('restaurants').delete().eq('name', RESTAURANTS[i].name);
      if (error) {
        failedCount++;
        setStatus(i, 'error', '❌ فشل الحذف: ' + error.message);
      } else {
        deletedCount++;
        const card = document.getElementById('card_' + i);
        if (card) card.style.opacity = '0.4';
        setStatus(i, 'error', '🗑️ تم الحذف');
      }
    }
    document.getElementById('selectedCount').innerText = failedCount === 0
      ? '✅ تم حذف ' + deletedCount + ' مطعم'
      : '⚠️ تم حذف ' + deletedCount + ' — فشل ' + failedCount;
    _selectedIndexes.clear();
    document.getElementById('selectModeBtn').disabled = false;
  }
  confirmBtn.disabled = false;
}

// ======================================================
// وظائف اللوغو
// ======================================================
const _logoData = {}; // تخزين base64 أو URL لكل مطعم بحسب index

function handleLogoFile(event, i) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    _logoData[i] = e.target.result;
    const preview = document.getElementById('logo_preview_' + i);
    preview.src = e.target.result;
    preview.classList.add('show');
    document.getElementById('logo_url_' + i).value = '';
  };
  reader.readAsDataURL(file);
}

function handleLogoUrl(event, i) {
  const url = event.target.value.trim();
  _logoData[i] = url;
  const preview = document.getElementById('logo_preview_' + i);
  if (url) {
    preview.src = url;
    preview.classList.add('show');
    preview.onerror = () => preview.classList.remove('show');
  } else {
    preview.classList.remove('show');
  }
}

// ======================================================
// وظائف الإضافة الاختيارية
// ======================================================
let _importSelectModeActive = false;
let _selectedImportIndexes = new Set();

function toggleSelectImportMode() {
  _importSelectModeActive = !_importSelectModeActive;
  const toolbar = document.getElementById('selectImportToolbar');
  const grid = document.getElementById('cardsGrid');
  const btn = document.getElementById('selectImportBtn');
  if (_importSelectModeActive) {
    toolbar.classList.add('active');
    btn.innerText = '✖️ إلغاء وضع الإضافة الاختيارية';
    Array.from(grid.children).forEach((card, i) => {
      card.classList.add('import-selectable');
      card.onclick = () => toggleImportCardSelection(card, i);
    });
  } else {
    toolbar.classList.remove('active');
    btn.innerText = '☑️ الإضافة الاختيارية — اختر المطاعم';
    _selectedImportIndexes.clear();
    Array.from(grid.children).forEach((card) => {
      card.classList.remove('import-selectable', 'import-selected');
      card.onclick = null;
    });
    document.getElementById('selectedImportCount').innerText = '0 مطعم محدد';
  }
}

function toggleImportCardSelection(card, i) {
  if (_selectedImportIndexes.has(i)) {
    _selectedImportIndexes.delete(i);
    card.classList.remove('import-selected');
  } else {
    _selectedImportIndexes.add(i);
    card.classList.add('import-selected');
  }
  document.getElementById('selectedImportCount').innerText = _selectedImportIndexes.size + ' مطعم محدد';
}

function selectAllImportCards() {
  const grid = document.getElementById('cardsGrid');
  Array.from(grid.children).forEach((card, i) => {
    if (!card.classList.contains('hidden')) {
      _selectedImportIndexes.add(i);
      card.classList.add('import-selected');
    }
  });
  document.getElementById('selectedImportCount').innerText = _selectedImportIndexes.size + ' مطعم محدد';
}

function deselectAllImportCards() {
  const grid = document.getElementById('cardsGrid');
  _selectedImportIndexes.clear();
  Array.from(grid.children).forEach((card) => {
    card.classList.remove('import-selected');
  });
  document.getElementById('selectedImportCount').innerText = '0 مطعم محدد';
}

async function importSelected() {
  if (_selectedImportIndexes.size === 0) {
    alert('لم تحدد أي مطعم للإضافة!');
    return;
  }
  const btn = document.getElementById('selectImportBtn');
  btn.disabled = true;
  const selectedArr = Array.from(_selectedImportIndexes);

  const { data: existing } = await _client.from('restaurants').select('name');
  const existingNames = (existing || []).map(r => r.name);

  let added = 0, skipped = 0, failed = 0;

  for (let idx = 0; idx < selectedArr.length; idx++) {
    const i = selectedArr[idx];
    const r = RESTAURANTS[i];
    setStatus(i, 'pending', '⏳ جاري الإضافة...');

    if (existingNames.includes(r.name)) {
      setStatus(i, 'exists', '✅ موجود مسبقاً — تم التخطي');
      skipped++;
      continue;
    }

    const restaurantLogo = _logoData[i] || r.logo || '';
    const menuWithLogo = r.restaurant_menu.map(m => {
      if (m.type === 'item' && !m.img && restaurantLogo) {
        return Object.assign({}, m, { img: restaurantLogo });
      }
      return m;
    });

    const payload = {
      name:            r.name,
      branch:          r.branch,
      logo:            restaurantLogo,
      delivery_fee:    r.delivery_fee,
      open_time:       r.open_time,
      close_time:      r.close_time,
      contract:        r.contract,
      restaurant_menu: menuWithLogo,
      profit_percent:  r.profit_percent,
      maps_url:        r.maps_url,
      specialty_type:  r.specialty_type,
      profit_history:  r.profit_history,
    };

    const { error } = await _client.from('restaurants').insert([payload]);
    if (error) {
      setStatus(i, 'error', '❌ فشل: ' + error.message);
      failed++;
    } else {
      const items = r.restaurant_menu.filter(m => m.type === 'item').length;
      setStatus(i, 'success', `✅ تمت الإضافة — ${items} منتج`);
      added++;
    }
  }

  document.getElementById('selectedImportCount').innerText =
    '✅ تمت إضافة ' + added + (skipped ? ' — تخطي ' + skipped : '') + (failed ? ' — فشل ' + failed : '');
  btn.disabled = false;
  _selectedImportIndexes.clear();
  Array.from(document.getElementById('cardsGrid').children).forEach(card => {
    card.classList.remove('import-selected');
  });
}

// ======================================================
// توليد اللوغو محلياً بدون API
// ======================================================
function generateLogoLocal(i) {
  const r = RESTAURANTS[i];
  const btn = document.getElementById('gen_btn_' + i);
  const statusEl = document.getElementById('gen_status_' + i);
  const preview = document.getElementById('logo_preview_' + i);

  btn.disabled = true;
  btn.innerText = '⏳ جاري الإنشاء...';

  const palettes = [
    { bg1: '#1a0a2e', bg2: '#3d1a6e', accent: '#d4af37' },
    { bg1: '#0a1a0a', bg2: '#1a4d1a', accent: '#f1c40f' },
    { bg1: '#1a0a0a', bg2: '#6e1a1a', accent: '#e74c3c' },
    { bg1: '#0a1a2e', bg2: '#1a3a6e', accent: '#3498db' },
    { bg1: '#1a1a0a', bg2: '#4d4400', accent: '#f39c12' },
    { bg1: '#0a1a1a', bg2: '#004d4d', accent: '#1abc9c' },
    { bg1: '#2e0a1a', bg2: '#6e1a4d', accent: '#e91e8c' },
    { bg1: '#1a0a1a', bg2: '#4a0a6e', accent: '#9b59b6' },
    { bg1: '#0f0a00', bg2: '#3d2b00', accent: '#e67e22' },
    { bg1: '#001a0a', bg2: '#003d1a', accent: '#27ae60' },
  ];
  const p = palettes[i % palettes.length];

  const cleanName = r.name.replace(/[^\u0600-\u06FFa-zA-Z\s\-]/g, '').trim();
  const words = cleanName.split(/\s+/).filter(w => w.length > 0);
  const initials = words.length >= 2
    ? (words[0][0] + words[1][0]).toUpperCase()
    : (words[0] ? words[0].substring(0, 2).toUpperCase() : '؟');

  const displayName = r.name.length > 14 ? r.name.substring(0, 13) + '…' : r.name;
  const emoji = r.icon || '🍽️';

  const svg = `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="rbg${i}" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="${p.bg2}"/>
      <stop offset="100%" stop-color="${p.bg1}"/>
    </radialGradient>
    <radialGradient id="rglow${i}" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="${p.accent}" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="${p.accent}" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow${i}">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="${p.accent}" flood-opacity="0.4"/>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#rbg${i})"/>
  <circle cx="100" cy="88" r="75" fill="url(#rglow${i})"/>
  <circle cx="100" cy="100" r="93" fill="none" stroke="${p.accent}" stroke-width="2.5" stroke-opacity="0.8"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="${p.accent}" stroke-width="0.7" stroke-opacity="0.3"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="${p.accent}" stroke-width="0.4" stroke-opacity="0.15"/>
  <text x="100" y="90" font-size="46" text-anchor="middle" dominant-baseline="middle" filter="url(#shadow${i})">${emoji}</text>
  <rect x="35" y="112" width="130" height="1.5" rx="1" fill="${p.accent}" opacity="0.6"/>
  <text x="100" y="136" font-family="'Segoe UI', Tahoma, Arial, sans-serif" font-size="14" font-weight="bold"
    text-anchor="middle" dominant-baseline="middle" fill="#ffffff">${displayName}</text>
  <text x="100" y="160" font-family="'Segoe UI', Tahoma, Arial, sans-serif" font-size="11"
    text-anchor="middle" dominant-baseline="middle" fill="${p.accent}" letter-spacing="3" opacity="0.85">${initials}</text>
  <circle cx="55" cy="160" r="2.5" fill="${p.accent}" opacity="0.6"/>
  <circle cx="145" cy="160" r="2.5" fill="${p.accent}" opacity="0.6"/>
  <circle cx="65" cy="160" r="1.2" fill="${p.accent}" opacity="0.3"/>
  <circle cx="135" cy="160" r="1.2" fill="${p.accent}" opacity="0.3"/>
</svg>`;

  const svgBlob = new Blob([svg], { type: 'image/svg+xml' });
  const svgUrl = URL.createObjectURL(svgBlob);
  _logoData[i] = svgUrl;
  preview.src = svgUrl;
  preview.classList.add('show');
  document.getElementById('logo_url_' + i).value = '';
  statusEl.innerText = '✅ تم إنشاء اللوغو!';
  statusEl.style.color = '#2ecc71';

  btn.disabled = false;
  btn.innerText = '🎨 إنشاء لوغو تلقائي';
}

buildCards();

// بعد بناء الكروت، نعرض اللوغو الموجود مسبقاً في بيانات المطعم
RESTAURANTS.forEach((r, i) => {
  if (r.logo) {
    _logoData[i] = r.logo;
    const preview = document.getElementById('logo_preview_' + i);
    if (preview) { preview.src = r.logo; preview.classList.add('show'); }
  }
});
</script>
